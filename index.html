<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather — Pritam Giri</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#060610;
  color:#e2e2f0;
}

/* Background */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(108,92,231,0.25), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0,206,201,0.2), transparent 50%);
  animation:bgMove 10s infinite alternate;
  z-index:-1;
}
@keyframes bgMove{100%{transform:scale(1.2);}}

/* Portfolio */
.back{
  position:fixed;top:20px;left:20px;
  padding:6px 12px;border-radius:100px;
  border:1px solid #1a1a35;
  background:rgba(6,6,16,.7);
  color:#aaa;text-decoration:none;
}

/* 💎 3D TOGGLE BUTTON */
.toggle{
  position:fixed;
  top:20px;
  right:20px;
  padding:10px 16px;
  border-radius:12px;
  border:none;
  background:linear-gradient(145deg,#1a1a35,#0a0a18);
  color:#a29bfe;
  font-weight:bold;
  cursor:pointer;
  box-shadow:
    4px 4px 10px #000,
    -2px -2px 6px rgba(255,255,255,0.05);
  transition:0.2s;
}
.toggle:active{
  transform:scale(0.95);
  box-shadow:inset 2px 2px 6px #000;
}

/* Layout */
.wrapper{max-width:850px;width:100%;}

.title{
  font-size:28px;
  background:linear-gradient(135deg,#a29bfe,#fd79a8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sub{font-size:12px;color:#888;margin-bottom:10px;}

.card{
  background:#0d0d1f;
  padding:25px;
  border-radius:20px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}

/* Search */
.search{display:flex;gap:10px;margin-bottom:10px;}
.search input{flex:1;padding:12px;border-radius:10px;border:none;}
.search button{padding:12px;border:none;border-radius:10px;background:#6c5ce7;color:white;}

/* Location */
.loc{
  width:100%;
  padding:10px;
  border:none;border-radius:10px;
  background:#00cec9;color:black;
  margin-bottom:10px;
  cursor:pointer;
}

/* Weather */
.weather{display:none;text-align:center;}
.icon{font-size:60px;}
.temp{font-size:40px;font-weight:bold;}

#aiText{color:#00cec9;margin-top:8px;}

/* Details */
.details{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;margin-top:10px;
}
.box{background:#10102a;padding:10px;border-radius:10px;}

/* Forecast */
.day{
  margin-top:10px;
  background:#10102a;
  padding:10px;
  border-radius:10px;
}

/* Graph */
canvas{
  margin-top:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

/* Light */
.light{background:#e2e8f0;color:black;}
.light .card{background:white;}
.light .box,.light .day,canvas{background:#eee;}
</style>
</head>

<body>

<a href="#" class="back">← Portfolio</a>
<button class="toggle" onclick="toggleTheme()">☀️ / 🌙</button>

<div class="wrapper">
  <div class="title">Weather</div>
  <div class="sub">by Pritam Giri</div>

  <div class="card">

    <div class="search">
      <input id="city" placeholder="Enter city">
      <button onclick="getWeather()">Search</button>
    </div>

    <button class="loc" onclick="getLocation()">📍 Detect My Location</button>

    <div class="weather" id="weather">
      <div class="icon" id="icon"></div>
      <div class="temp" id="temp"></div>
      <div id="cityName"></div>
      <p id="condition"></p>

      <p id="aiText"></p>

      <div class="details">
        <div class="box">💧 <span id="humidity"></span></div>
        <div class="box">🌬 <span id="wind"></span></div>
        <div class="box">🌡 <span id="feels"></span></div>
        <div class="box">👁 <span id="visibility"></span></div>
      </div>

      <div id="forecast"></div>

      <canvas id="chart" width="300" height="150"></canvas>

    </div>
  </div>
</div>

<script>
let forecastData=[];

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* AI */
function getAIAdvice(t,c){
  if(t>35)return "🔥 Too hot!";
  if(t<10)return "🥶 Cold!";
  if(c.includes("rain"))return "🌧 Carry umbrella!";
  return "🌤 Nice weather!";
}

/* Graph */
function drawChart(){
  const c=document.getElementById("chart");
  const ctx=c.getContext("2d");

  const temps=forecastData.map(d=>parseInt(d.avgtempC));

  ctx.clearRect(0,0,c.width,c.height);

  const gradient=ctx.createLinearGradient(0,0,0,150);
  gradient.addColorStop(0,"#a29bfe");
  gradient.addColorStop(1,"#00cec9");

  ctx.beginPath();

  temps.forEach((t,i)=>{
    let x=i*40;
    let y=150-(t*3);
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle=gradient;
  ctx.lineWidth=3;
  ctx.shadowBlur=15;
  ctx.shadowColor="#6c5ce7";
  ctx.stroke();
}

/* Fetch */
async function fetchWeather(url,name){
  const res=await fetch(url);
  const data=await res.json();
  const w=data.current_condition[0];

  forecastData=data.weather;

  document.getElementById("weather").style.display="block";

  document.getElementById("temp").innerText=w.temp_C+"°C";
  document.getElementById("cityName").innerText=name;

  let cond=w.weatherDesc[0].value.toLowerCase();
  document.getElementById("condition").innerText=w.weatherDesc[0].value;
  document.getElementById("icon").innerText=cond.includes("rain")?"🌧":"☀️";

  document.getElementById("humidity").innerText=w.humidity+"%";
  document.getElementById("wind").innerText=w.windspeedKmph+" km/h";
  document.getElementById("feels").innerText=w.FeelsLikeC+"°C";
  document.getElementById("visibility").innerText=w.visibility+" km";

  document.getElementById("aiText").innerText=getAIAdvice(parseInt(w.temp_C),cond);

  document.getElementById("forecast").innerHTML =
    data.weather.map(d=>`<div class="day">${d.date} - ${d.avgtempC}°C</div>`).join("");

  drawChart();
}

/* Search */
function getWeather(){
  const c=document.getElementById("city").value;
  fetchWeather(`https://wttr.in/${c}?format=j1`,c);
}

/* Location */
async function getLocation(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    fetchWeather(`https://wttr.in/${lat},${lon}?format=j1`,"Loading...");

    try{
      const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
      const g=await geo.json();
      const city=g.address.city||g.address.town||g.address.village;
      document.getElementById("cityName").innerText=city;
    }catch{}
  });
}
</script>

</body>
</html>
